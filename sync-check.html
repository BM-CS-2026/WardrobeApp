<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sync & Fix</title>
<style>body{font-family:-apple-system,sans-serif;padding:20px;max-width:500px;margin:0 auto;background:#f5f5f7}
.card{background:white;border-radius:12px;padding:16px;margin:12px 0}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin:8px 0}
.btn-blue{background:#4874d4;color:white}
.btn-green{background:#22c55e;color:white}
.btn-red{background:#ef4444;color:white}
#log{background:white;border-radius:10px;padding:12px;font-size:11px;max-height:500px;overflow-y:auto;white-space:pre-wrap;font-family:monospace}
h1{font-size:20px} .num{font-size:28px;font-weight:700;color:#4874d4}
input{width:100%;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:12px;margin:6px 0;box-sizing:border-box}
</style></head><body>
<h1>My Style — Sync & Fix</h1>

<div class="card">
  <div>Local items: <span class="num" id="local-count">...</span></div>
  <div>Local outfits: <span class="num" id="local-outfits">...</span></div>
  <div>Local images: <span class="num" id="local-images">...</span></div>
</div>

<div class="card">
  <strong>Sync URL:</strong>
  <input id="sync-url-input" placeholder="Paste Cloudant URL here...">
  <button class="btn btn-green" onclick="saveUrlAndPull()">Save URL & Pull All Data</button>
</div>

<div class="card">
  <button class="btn btn-blue" onclick="forcePull()">Force Pull from Cloud</button>
  <button class="btn btn-blue" onclick="forcePush()">Force Push to Cloud</button>
  <button class="btn btn-blue" onclick="checkRemote()">Check Remote DB</button>
  <button class="btn btn-red" onclick="nukeCache()">Nuke All Caches & Reload</button>
</div>

<div class="card">
  <a href="./" style="display:block;text-align:center;font-size:15px;font-weight:600;color:#4874d4;text-decoration:none;padding:10px">← Back to My Style App</a>
</div>

<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
<script>
const localDB = new PouchDB('wardrobe_sync');

function log(m){const l=document.getElementById('log');l.textContent+=m+'\n';l.scrollTop=l.scrollHeight}

function getUrl() {
  return (document.getElementById('sync-url-input').value || '').replace(/\s+/g, '');
}

function makeRemote(rawUrl) {
  var url = rawUrl.replace(/\s+/g, '');
  try {
    var parsed = new URL(url);
    if (parsed.username) {
      var user = decodeURIComponent(parsed.username);
      var pass = decodeURIComponent(parsed.password);
      var creds = btoa(user + ':' + pass);
      parsed.username = ''; parsed.password = '';
      var baseUrl = parsed.toString();
      log('  Base URL: ' + baseUrl.substring(0, 50) + '...');
      return new PouchDB(baseUrl, {
        skip_setup: true,
        ajax: { headers: { 'Authorization': 'Basic ' + creds }, withCredentials: false },
        fetch: function(u, o) {
          o = o || {};
          o.headers = new Headers(o.headers || {});
          o.headers.set('Authorization', 'Basic ' + creds);
          o.credentials = 'omit';
          return fetch(u, o);
        }
      });
    }
  } catch(e) { log('  URL parse error: ' + e.message); }
  return new PouchDB(url, { skip_setup: true });
}

async function check() {
  const items = await localDB.allDocs({startkey:'items:',endkey:'items:\ufff0'});
  const outfits = await localDB.allDocs({startkey:'outfits:',endkey:'outfits:\ufff0'});
  const images = await localDB.allDocs({startkey:'images:',endkey:'images:\ufff0'});
  document.getElementById('local-count').textContent = items.rows.length;
  document.getElementById('local-outfits').textContent = outfits.rows.length;
  document.getElementById('local-images').textContent = images.rows.length;
  // Load saved URL
  const savedUrl = (localStorage.getItem('sync_remote_url') || '').replace(/\s+/g, '');
  document.getElementById('sync-url-input').value = savedUrl;
  log('Local: ' + items.rows.length + ' items, ' + outfits.rows.length + ' outfits, ' + images.rows.length + ' images');
}

async function saveUrlAndPull() {
  const url = getUrl();
  if (!url) { alert('Please paste the Cloudant URL first'); return; }
  localStorage.setItem('sync_remote_url', url);
  log('\nURL saved! Starting pull...');
  await forcePull();
}

async function forcePull() {
  const url = getUrl() || (localStorage.getItem('sync_remote_url') || '').replace(/\s+/g, '');
  if (!url) { log('No URL!'); return; }
  log('\nPulling from cloud...');
  try {
    const remote = makeRemote(url);
    // Test connection
    const info = await remote.info();
    log('Connected! Remote has ' + info.doc_count + ' docs');
    // Pull
    const result = await localDB.replicate.from(remote);
    log('PULL COMPLETE: ' + result.docs_written + ' docs written');
    await check();
    log('\n*** SUCCESS — go back to the app and it should show all items ***');
  } catch(e) {
    log('PULL ERROR: ' + e.message);
    log('Details: ' + JSON.stringify(e).substring(0, 200));
  }
}

async function forcePush() {
  const url = getUrl() || (localStorage.getItem('sync_remote_url') || '').replace(/\s+/g, '');
  if (!url) { log('No URL!'); return; }
  log('\nPushing to cloud...');
  try {
    const remote = makeRemote(url);
    const info = await remote.info();
    log('Connected! Remote has ' + info.doc_count + ' docs');
    const result = await localDB.replicate.to(remote);
    log('PUSH COMPLETE: ' + result.docs_written + ' docs written');
  } catch(e) {
    log('PUSH ERROR: ' + e.message);
    log('Details: ' + JSON.stringify(e).substring(0, 200));
  }
}

async function checkRemote() {
  const url = getUrl() || (localStorage.getItem('sync_remote_url') || '').replace(/\s+/g, '');
  if (!url) { log('No URL!'); return; }
  log('\nChecking remote...');
  try {
    const remote = makeRemote(url);
    const info = await remote.info();
    log('Remote: ' + info.doc_count + ' total docs');
    const items = await remote.allDocs({startkey:'items:',endkey:'items:\ufff0'});
    const outfits = await remote.allDocs({startkey:'outfits:',endkey:'outfits:\ufff0'});
    const images = await remote.allDocs({startkey:'images:',endkey:'images:\ufff0'});
    log('Remote: ' + items.rows.length + ' items, ' + outfits.rows.length + ' outfits, ' + images.rows.length + ' images');
  } catch(e) { log('ERROR: ' + e.message); }
}

async function nukeCache() {
  log('\nNuking all caches...');
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) { await r.unregister(); log('  Unregistered SW'); }
  }
  const keys = await caches.keys();
  for (const k of keys) { await caches.delete(k); log('  Deleted cache: ' + k); }
  log('All caches cleared! Reloading...');
  setTimeout(() => location.reload(true), 1000);
}

check();
</script></body></html>
