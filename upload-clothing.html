function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9)}

async function blobToDataUrl(blob){
  return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob)});
}

async function resizeDataUrl(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800,Q=0.65;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',Q));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

async function run(){
  const log=document.getElementById('log');
  const prog=document.getElementById('progress');
  const bar=document.getElementById('bar');
  const db=new PouchDB('wardrobe_sync');
  let ok=0,fail=0,skip=0;

  for(let i=0;i<ITEMS.length;i++){
    const item=ITEMS[i];
    const pct=Math.round((i/ITEMS.length)*100);
    prog.textContent=`Uploading ${i+1}/${ITEMS.length} (${pct}%)`;
    bar.style.width=pct+'%';

    try{
      // Fetch image from local server
      const resp=await fetch(BASE+item.file);
      if(!resp.ok) throw new Error('File not found: '+item.file);
      const blob=await resp.blob();
      const rawDataUrl=await blobToDataUrl(blob);
      const dataUrl=await resizeDataUrl(rawDataUrl);

      const imageId=genId();
      const itemId=genId();

      await db.put({_id:'images:'+imageId,type:'images',dataUrl:dataUrl});
      await db.put({_id:'items:'+itemId,type:'items',name:item.name,category:item.category,
        colorProfile:{dominantColor:{hue:0,saturation:0,lightness:0.5},secondaryColors:[],averageColor:{hue:0,saturation:0,lightness:0.5}},
        imageId:imageId,styleTags:[],dateAdded:Date.now()-(ITEMS.length-i)*1000});

      ok++;
      log.textContent+='✓ '+item.name.substring(0,60)+'\n';
    }catch(e){
      if(e.status===409){skip++;log.textContent+='⊘ Exists\n';}
      else{fail++;log.textContent+='✗ '+item.file+': '+e.message+'\n';}
    }
    log.scrollTop=log.scrollHeight;
  }

  bar.style.width='100%';
  prog.textContent=`Done! ${ok} uploaded, ${skip} skipped, ${fail} failed.`;
  log.textContent+='\nAll done! Reload the app to see items, then Wipe Remote & Push to sync.\n';
}
