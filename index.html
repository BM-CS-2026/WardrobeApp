<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4874d4">
  <title>My Style</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css?v=34">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    // Show any JS errors as visible alerts
    window.onerror = function(msg, src, line) {
      document.title = 'ERROR';
      alert('JS Error: ' + msg + '\nFile: ' + src + '\nLine: ' + line);
    };
    window.addEventListener('unhandledrejection', function(e) {
      alert('JS Error: ' + e.reason);
    });

    // Disable service worker — it causes stale cache issues between devices
    // The app works fine without it (just needs internet to load)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(async regs => {
        for (const r of regs) await r.unregister();
        const keys = await caches.keys();
        for (const k of keys) await caches.delete(k);
      });
    }
  </script>
</head>
<body>
  <!-- Global top bar — always visible -->
  <div class="global-top-bar">
    <button id="home-btn" onclick="window.app && app.goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M12 2C9.8 2 8 3.8 8 6h8c0-2.2-1.8-4-4-4z"/>
        <path d="M4 6l-1 14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2L20 6H4z"/>
        <path d="M8 6v2a4 4 0 0 0 8 0V6"/>
        <circle cx="12" cy="15" r="2" fill="currentColor" stroke="none"/>
        <path d="M12 13v-2"/>
      </svg>
      <span style="font-size:15px;letter-spacing:0.5px">My Style</span>
    </button>
    <span id="sync-dot" title="Sync status" onclick="window.app && app.showSyncSettings()" style="width:10px;height:10px;border-radius:50%;background:#999;display:inline-block;cursor:pointer;margin-left:auto;margin-right:12px"></span>
  </div>

  <!-- App content area -->
  <div class="app-content">
    <!-- Wardrobe Tab -->
    <div id="view-wardrobe" class="view active"></div>

    <!-- Palettes Tab -->
    <div id="view-palettes" class="view"></div>

    <!-- Outfits Tab -->
    <div id="view-outfits" class="view"></div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="active" data-tab="wardrobe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.38 3.46 16 2 12 5.5 8 2 3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/>
      </svg>
      <span>Wardrobe</span>
    </button>
    <button data-tab="palettes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="13.5" cy="6.5" r="0.5" fill="currentColor"/>
        <circle cx="17.5" cy="10.5" r="0.5" fill="currentColor"/>
        <circle cx="8.5" cy="7.5" r="0.5" fill="currentColor"/>
        <circle cx="6.5" cy="12.5" r="0.5" fill="currentColor"/>
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
      </svg>
      <span>Palettes</span>
    </button>
    <button data-tab="outfits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3z"/>
        <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
      </svg>
      <span>Outfits</span>
    </button>
    <button onclick="window.app && app.showWishlist()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Wish List</span>
    </button>
  </nav>

  <!-- Bottom Sheet Modal -->
  <div id="sheet-overlay" class="modal-overlay">
    <div class="modal-sheet"></div>
  </div>

  <!-- Detail View (full screen) -->
  <div id="detail-overlay" class="detail-view"></div>

  <!-- Color Picker Overlay -->
  <div id="color-picker-overlay" class="modal-overlay">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <h2>Pick Color</h2>
      <div id="cp-preview" class="color-preview"></div>
      <div class="color-slider-group">
        <div class="slider-row">
          <div class="slider-header"><span>Hue</span><span id="cp-hue-val">220°</span></div>
          <input type="range" id="cp-hue" min="0" max="360" value="220">
        </div>
        <div class="slider-row">
          <div class="slider-header"><span>Saturation</span><span id="cp-sat-val">60%</span></div>
          <input type="range" id="cp-sat" min="0" max="100" value="60">
        </div>
        <div class="slider-row">
          <div class="slider-header"><span>Lightness</span><span id="cp-light-val">45%</span></div>
          <input type="range" id="cp-light" min="0" max="100" value="45">
        </div>
      </div>
      <button class="btn btn-primary" id="cp-done">Done</button>
    </div>
  </div>

  <!-- Hidden file inputs (must live outside the sheet so they persist after closeSheet) -->
  <input type="file" accept="image/*" multiple class="file-input" id="file-picker-hidden">
  <input type="file" accept="image/*" capture="environment" class="file-input" id="file-camera-hidden">

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loading-msg">Loading...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pouchdb@7.3.1/dist/pouchdb.min.js"></script>

  <!-- Pre-sync: pull data from Cloudant BEFORE app loads (PouchDB 7.x supports credentials in URL) -->
  <script>
  (async function() {
    var syncUrl = (localStorage.getItem('sync_remote_url') || '').replace(/\s+/g, '');
    if (!syncUrl) return;
    var msg = document.getElementById('loading-msg');
    var overlay = document.getElementById('loading-overlay');
    if (overlay) overlay.classList.add('show');
    if (msg) msg.textContent = 'Syncing data...';
    try {
      var remote = new PouchDB(syncUrl, { skip_setup: true });
      var local = new PouchDB('wardrobe_sync');
      var info = await local.info();
      if (info.doc_count < 5) {
        if (msg) msg.textContent = 'Downloading wardrobe...';
        await local.replicate.from(remote, { batch_size: 50 });
        if (msg) msg.textContent = 'Done!';
      }
    } catch(e) {
      console.warn('[Pre-sync] failed:', e.message || e);
      if (msg) msg.textContent = 'Loading...';
    }
    if (overlay) overlay.classList.remove('show');
  })();
  </script>

  <script type="module" src="js/app30.js?v=41"></script>
</body>
</html>
